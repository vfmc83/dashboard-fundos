  .ficha-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;border-bottom:1px solid var(--linha);padding-bottom:18px;margin-top:8px}
  .ficha-head h1{font-size:40px}

  @media(max-width:780px){.kpis{grid-template-columns:repeat(2,1fr)}.hideSm{display:none}.cols2{grid-template-columns:1fr}.bar-row .lab{width:110px}}
</style>

<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useMemo} = React;

const HEX = {'FII':'#004463','Fiagro':'#7E8C59','FI-Infra':'#A98A5B','FIP':'#00303F'};
const ORDEM_CLASSE = ['FII','Fiagro','FI-Infra','FIP'];

const pct=(v,d=1)=>v==null?'—':(v*100).toFixed(d)+'%';
const num=(v,d=2)=>v==null?'—':v.toFixed(d);
const cot=(v)=>v==null?'—':'R$ '+v.toFixed(2);
const brl=(v)=>{if(v==null)return '—';const a=Math.abs(v);
  if(a>=1e9)return 'R$ '+(v/1e9).toFixed(2)+' bi';
  if(a>=1e6)return 'R$ '+(v/1e6).toFixed(0)+' mi';
  if(a>=1e3)return 'R$ '+(v/1e3).toFixed(0)+' mil';return 'R$ '+v.toFixed(0);};
const mediana=(arr)=>{const a=arr.filter(x=>x!=null).sort((x,y)=>x-y);if(!a.length)return null;
  const m=Math.floor(a.length/2);return a.length%2?a[m]:(a[m-1]+a[m])/2;};
const pctlAcima=(arr,v)=>{const a=arr.filter(x=>x!=null);if(!a.length||v==null)return null;
  return Math.round(a.filter(x=>x<v).length/a.length*100);};

function Logo(){
  return (<svg className="sym" viewBox="0 0 40 47" role="img" aria-label="Engage">
    <rect y="0" width="38" height="7" rx="1.5" fill="var(--petroleo)"/>
    <rect y="10" width="20" height="7" rx="1.5" fill="#939598"/>
    <rect y="20" width="30" height="7" rx="1.5" fill="var(--petroleo)"/>
    <rect y="30" width="20" height="7" rx="1.5" fill="#939598"/>
    <rect y="40" width="38" height="7" rx="1.5" fill="var(--petroleo)"/>
  </svg>);
}

function Header(){
  return (<header className="top"><div className="top-inner">
    <div className="brand"><Logo/><span className="mark">ENGAGE</span><span className="div"></span><span className="sub">Fundos Listados</span></div>
    <span className="top-note">Uso exclusivo clientes Engage</span>
  </div></header>);
}

// ---- Score de risco Engage (comparavel dentro da classe; nao e recomendacao) ----
const PERFIL_RISCO={"Desenvolvimento":88,"Crédito (FIDC)":70,"Papel (CRI)":60,"Infraestrutura (FIP-IE)":60,"Imobiliário":56,"Gestão ativa":54,"Outros":54,"Híbrido":50,"Infraestrutura":42,"Tijolo":40,"FoF":30};
const FAIXAS=[{n:'Muito baixo',c:'#4A7C59'},{n:'Baixo',c:'#7E8C59'},{n:'Médio',c:'#A98A5B'},{n:'Alto',c:'#B5773A'},{n:'Muito alto',c:'#9B3B2F'}];
const faixaIdx=s=>s==null?-1:s<38?0:s<48?1:s<58?2:s<68?3:4;
function _pr(arr,v){const n=arr.length;if(n<=1)return 0.5;let c=0;for(const x of arr)if(x<=v)c++;return (c-1)/(n-1);}
function _sinalRel(txt){if(!txt)return null;let t=txt.toLowerCase();
  // Neutraliza negacoes ("sem inadimplencia", "nao foram destacados eventos de inadimplencia")
  const negRe=/(n[ãa]o\b|sem\b)([^.\n]{0,45}?)(inadimpl\w*|eventos?\s+negativos?|evento\s+de\s+cr[ée]dito|default|calote)/gi;
  const t2=t.replace(negRe,'$1$2 semrisco ');const limpo=(t2!==t);t=t2;
  // SO deterioracao de credito/ativo sobe o score. Sinais de mercado/distribuicao NAO contam.
  let s=30;const add=(re,p)=>{if(re.test(t))s+=p;};
  add(/inadimpl|\bnpl\b|calote|devedores duvidosos/,22);
  add(/recupera[çc][ãa]o judicial|\brj\b|reperfilament|reestrutura[çc][ãa]o de d[íi]vida|renegocia[çc][ãa]o de d[íi]vida/,26);
  add(/\bdefault\b|vencimento antecipado|inadimplement|execu[çc][ãa]o (de |da )?garantia/,26);
  add(/\bpdd\b|provis[ãa]o para (devedores|perdas)/,14);
  add(/estressad|menor rating|rating baixo|rebaixament|downgrade/,14);
  add(/alavancagem elevada|acima de 100% do pl/,12);
  add(/vac[âa]nc\w*[^.\n]{0,25}(elevad|alta|subiu|aument|deteriora)/,12);
  if(limpo||/carteira (adimplente|saud[áa]vel)|conservador/.test(t))s-=15;
  return Math.max(0,Math.min(100,s));}
function computeScores(fundos){
  fundos.forEach(f=>{
    const rperf=PERFIL_RISCO[f.subclasse]!=null?PERFIL_RISCO[f.subclasse]:54;
    const rs=_sinalRel(f.pontos_atencao);
    const sc=(rs!=null)?0.40*rperf+0.60*rs:rperf;
    f._rperf=Math.round(rperf);f._rs=(rs==null?null:Math.round(rs));
    f._sc=Math.round(sc);f._faixa=faixaIdx(f._sc);f._scPrelim=(rs==null);});
  return fundos;
}
function RiscoBadge({f}){
  if(f._sc==null)return <span className="rbadge dim">—</span>;
  const fx=FAIXAS[f._faixa];
  return (<span className="rbadge" style={{color:fx.c}} title={fx.n+(f._scPrelim?' · preliminar (sem relatório lido)':'')}>
    <b style={{background:fx.c}}>{f._sc}</b><span className="rbadge-n">{fx.n}{f._scPrelim?' *':''}</span></span>);
}
function RiscoPanel({f}){
  if(f._sc==null)return null;
  const fx=FAIXAS[f._faixa];
  const comp=[['Perfil do segmento',f._rperf]];
  if(f._rs!=null)comp.push(['Sinais dos relatórios',f._rs]);
  return (<div className="panel">
    <h3>Score de risco Engage</h3>
    <div className="cap">Foco em qualidade dos ativos e risco de crédito (0 = menor · 100 = maior). Indicador de atenção, não recomendação.</div>
    <div className="risco-top">
      <div className="risco-nota" style={{background:fx.c}}>{f._sc}</div>
      <div><div className="risco-faixa" style={{color:fx.c}}>{fx.n}</div>
        <div className="cap" style={{margin:'2px 0 0'}}>{f._scPrelim?'Preliminar — perfil do segmento (relatório ainda não lido; sinais de crédito entram depois).':'Inclui sinais reais do relatório mais recente (crédito, inadimplência, distribuição).'}</div></div>
    </div>
    <div className="risco-comp">{comp.map(([k,v])=>(<div key={k} className="rc-row"><span className="rc-l">{k}</span><span className="rc-t"><span className="rc-f" style={{width:v+'%',background:fx.c}}></span></span><span className="rc-v">{v}</span></div>))}</div>
  </div>);
}

function niceTicks(min,max,n){
  n=n||5;
  if(!isFinite(min)||!isFinite(max))return {ticks:[],step:1};
  if(min===max)return {ticks:[min],step:1};
  const span=max-min, raw=span/n, mag=Math.pow(10,Math.floor(Math.log10(raw))), norm=raw/mag;
  let step= norm<1.5?1: norm<3?2: norm<7?5:10; step*=mag;
  const out=[], start=Math.ceil(min/step)*step;
  for(let v=start; v<=max+step*1e-6; v+=step)out.push(+(Math.round(v/step)*step).toFixed(10));
  return {ticks:out, step};
}

function Scatter({fundos,onSel,comparar}){
  const [hv,setHv]=useState(null);
  const W=920,H=340,pad=46;
  const pts=fundos.filter(f=>f.pvpa!=null && f.dy_ltm!=null && f.pvpa>0 && f.pvpa<2.2 && f.dy_ltm>=0 && f.dy_ltm<0.5);
  const classes=[...new Set(pts.map(p=>p.classe))];
  if(!pts.length)return (<div><svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
      <line x1={pad} y1={H-pad} x2={W-20} y2={H-pad} stroke="var(--linha)"/>
      <text x={W/2} y={H/2} fontSize="13" textAnchor="middle" fill="var(--neutro)">Nenhum fundo com P/VP e DY dentro do filtro atual.</text></svg></div>);
  const xs=pts.map(p=>p.pvpa), ys=pts.map(p=>p.dy_ltm);
  const spanX=(Math.max(...xs)-Math.min(...xs))||0.1, spanY=(Math.max(...ys)-Math.min(...ys))||0.02;
  const xMin=Math.max(0,Math.min(...xs)-spanX*0.08), xMax=Math.max(...xs)+spanX*0.08;
  const yMin=Math.max(0,Math.min(...ys)-spanY*0.12), yMax=Math.max(...ys)+spanY*0.12;
  const X=v=>pad+((v-xMin)/(xMax-xMin))*(W-pad*1.4);
  const Y=v=>H-pad-((v-yMin)/(yMax-yMin))*(H-pad*1.6);
  const tx=niceTicks(xMin,xMax,5), ty=niceTicks(yMin,yMax,5);
  const dX=tx.step<0.1?2:1, dY=ty.step<0.01?1:0, showOne=xMin<=1&&xMax>=1;
  return (<div>
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
      {ty.ticks.map(t=>(<line key={'gy'+t} x1={pad} y1={Y(t)} x2={W-20} y2={Y(t)} stroke="var(--trilho)"/>))}
      <line x1={pad} y1={H-pad} x2={W-20} y2={H-pad} stroke="var(--linha)"/>
      {showOne && <line x1={X(1)} y1={20} x2={X(1)} y2={H-pad} stroke="var(--linha)" strokeDasharray="4 4"/>}
      {showOne && <text x={X(1)} y={16} fontSize="10" textAnchor="middle" fill="var(--neutro)">P/VP = 1,00</text>}
      {tx.ticks.map(t=>(<text key={'x'+t} x={X(t)} y={H-pad+16} fontSize="10" textAnchor="middle" fill="var(--neutro)">{t.toFixed(dX)}</text>))}
      {ty.ticks.map(t=>(<text key={'y'+t} x={pad-8} y={Y(t)+3} fontSize="10" textAnchor="end" fill="var(--neutro)">{(t*100).toFixed(dY)}%</text>))}
      <text x={W/2} y={H-6} fontSize="11" textAnchor="middle" fill="var(--neutro)">P/VP →</text>
      <text x={14} y={20} fontSize="11" fill="var(--neutro)">DY LTM ↑</text>
      {pts.map(p=>{const on=hv&&hv.f.ticker===p.ticker;const mk=comparar&&comparar.has(p.ticker);const dim=comparar&&comparar.size>0&&!mk;return (
        <g key={p.ticker}>
        <circle cx={X(p.pvpa)} cy={Y(p.dy_ltm)} r={on?7:(mk?6:4)} fill={HEX[p.classe]} fillOpacity={dim?0.14:(on||mk?1:0.66)}
          stroke={mk?'var(--petroleo)':(on?'#fff':'none')} strokeWidth={mk?2:(on?1.5:0)} style={{cursor:'pointer'}}
          onMouseMove={e=>setHv({f:p,x:e.clientX,y:e.clientY})} onMouseLeave={()=>setHv(null)} onClick={()=>onSel(p)}/>
        {mk && <text x={X(p.pvpa)+9} y={Y(p.dy_ltm)+3.5} fontSize="10.5" fontWeight="700" fill="var(--petroleo)" style={{pointerEvents:'none'}}>{p.ticker}</text>}
        </g>);})}
    </svg>
    <div className="legend">{classes.map(c=>(<span key={c}><i style={{background:HEX[c]}}></i>{c}</span>))}<span style={{marginLeft:'auto'}}>Passe o mouse para ver · clique para abrir</span></div>
    {hv && <div className="tooltip" style={{left:Math.min(hv.x+14,window.innerWidth-250),top:hv.y+14}}>
      <b>{hv.f.ticker}</b> · {hv.f.subclasse}<br/><span>{hv.f.nome}</span><br/>P/VP <b>{num(hv.f.pvpa)}</b> · DY <b>{pct(hv.f.dy_ltm)}</b></div>}
  </div>);
}

function Bars({items,fmt,onClick}){
  const max=Math.max(...items.map(i=>Math.abs(i.value)||0),1e-9);
  return (<div>{items.map(it=>(
    <div key={it.key} className={'bar-row'+(onClick&&it.ticker?' click':'')} onClick={()=>onClick&&it.ticker&&onClick(it.ticker)}>
      <span className="lab">{it.label}</span>
      <span className="track"><span className="fill" style={{width:(Math.abs(it.value)/max*100)+'%',background:it.cor}}></span></span>
      <span className="val">{fmt(it.value)}</span>
    </div>))}</div>);
}

function Analises({fundos,classe,onSel,comparar}){
  const [tab,setTab]=useState('disp');
  const [mSeg,setMSeg]=useState('dy');
  const [mRk,setMRk]=useState('dy');
  const segDefs={dy:['DY LTM mediano',f=>mediana(f.map(x=>x.dy_ltm)),v=>pct(v)],
    pvpa:['P/VP mediano',f=>mediana(f.map(x=>x.pvpa)),v=>num(v)],
    pl:['Patrimônio total',f=>f.reduce((s,x)=>s+(x.valor_patrimonial||0),0),v=>brl(v)],
    ret:['Retorno 12m mediano',f=>mediana(f.map(x=>x.ret_ltm)),v=>pct(v)]};
  const rkDefs={dy:['Maior DY LTM','dy_ltm',-1,v=>pct(v)],
    vm:['Maior valor de mercado','valor_mercado',-1,v=>brl(v)],
    ret:['Maior retorno 12m','ret_ltm',-1,v=>pct(v)],
    pvpa:['Menor P/VP (desconto)','pvpa',1,v=>num(v)]};
  const gkey = classe==='Todos'?'classe':'subclasse';
  const groups={}; fundos.forEach(f=>{(groups[f[gkey]]=groups[f[gkey]]||[]).push(f);});
  const segItems=Object.entries(groups).map(([k,arr])=>({key:k,label:k+' ('+arr.length+')',
    value:segDefs[mSeg][1](arr)||0,cor:classe==='Todos'?HEX[k]:HEX[classe]})).sort((a,b)=>b.value-a.value);
  const rk=rkDefs[mRk]; const acc=rk[1];
  const rkItems=[...fundos].filter(f=>f[acc]!=null).sort((a,b)=>(a[acc]-b[acc])*rk[2]).slice(0,12)
    .map(f=>({key:f.ticker,ticker:f.ticker,label:f.ticker+' · '+(f.subclasse||''),value:f[acc],cor:HEX[f.classe]}));
  return (<div className="panel">
    <div className="tabs">
      <button className={'tab'+(tab==='disp'?' on':'')} onClick={()=>setTab('disp')}>Dispersão P/VP × DY</button>
      <button className={'tab'+(tab==='seg'?' on':'')} onClick={()=>setTab('seg')}>Comparativo por segmento</button>
      <button className={'tab'+(tab==='rk'?' on':'')} onClick={()=>setTab('rk')}>Rankings</button>
    </div>
    {tab==='disp' && <div><div className="cap">Cada ponto é um fundo; cor por classe. Quanto mais alto e à esquerda, maior o yield com menor preço sobre patrimônio. Marque fundos na tabela abaixo para destacá-los no gráfico.</div><Scatter fundos={fundos} onSel={onSel} comparar={comparar}/></div>}
    {tab==='seg' && <div>
      <div className="seg-sel">{Object.entries(segDefs).map(([k,d])=>(<button key={k} className={mSeg===k?'on':''} onClick={()=>setMSeg(k)}>{d[0]}</button>))}</div>
      <Bars items={segItems} fmt={segDefs[mSeg][2]}/></div>}
    {tab==='rk' && <div>
      <div className="seg-sel">{Object.entries(rkDefs).map(([k,d])=>(<button key={k} className={mRk===k?'on':''} onClick={()=>setMRk(k)}>{d[0]}</button>))}</div>
      <Bars items={rkItems} fmt={rk[3]} onClick={t=>onSel(fundos.find(f=>f.ticker===t))}/></div>}
  </div>);
}

function Comparar({fundos,onClose}){

function VsPares({f,todos}){
  const pares=todos.filter(x=>x.classe===f.classe&&x.subclasse===f.subclasse&&x.ticker!==f.ticker);
  if(pares.length<2)return <div className="note">Poucos pares no segmento {f.subclasse} para comparação estatística.</div>;
  const defs=[['DY LTM','dy_ltm',pct],['P/VP','pvpa',num],['Retorno 12m','ret_ltm',pct]];
  return (<div>{defs.map(([t,key,fmt])=>{
    const val=f[key], med=mediana(pares.map(x=>x[key]));
    if(val==null||med==null)return null;
    const max=Math.max(Math.abs(val),Math.abs(med))||1;
    const p=pctlAcima(pares.map(x=>x[key]),val);
    const acima=val>med;
    const txt = key==='pvpa'
      ? (acima?`prêmio de ${((val/med-1)*100).toFixed(0)}% vs pares`:`desconto de ${((1-val/med)*100).toFixed(0)}% vs pares`)
      : `${acima?'acima':'abaixo'} de ${p}% dos pares`;
    return (<div className="vs-row" key={t}>
      <div className="top"><span>{t}</span><span><b>{fmt(val)}</b> · mediana {fmt(med)} · {txt}</span></div>
      <div className="vs-bars">
        <div className="t2"><span style={{width:54}}>Fundo</span><span className="track"><span className="fill" style={{width:(Math.abs(val)/max*100)+'%',background:HEX[f.classe]}}></span></span></div>
        <div className="t2"><span style={{width:54}}>Pares</span><span className="track"><span className="fill" style={{width:(Math.abs(med)/max*100)+'%',background:'var(--pedra)'}}></span></span></div>
      </div></div>);})}
    <div className="cap" style={{marginTop:8}}>Comparação com {pares.length} pares do segmento {f.subclasse}.</div>
  </div>);
}

function DocsFundo({f,docs}){
  if(!docs)return null;
  const dkey=s=>{const m=(s||'').match(/(\d{2})\/(\d{2})\/(\d{4})(?:\s+(\d{2}):(\d{2}))?/);return m?m[3]+m[2]+m[1]+(m[4]||'00')+(m[5]||'00'):'00000000';};
  const meus=docs.filter(d=>d.ticker===f.ticker).sort((a,b)=>dkey(b.dataEntrega).localeCompare(dkey(a.dataEntrega))).slice(0,50);
  if(!meus.length)return null;
  return (<div className="panel"><h3>Documentos · Fundos.NET</h3><div className="cap">{meus.length} documentos coletados (Relatório Gerencial e Fato Relevante).</div>
    <div style={{maxHeight:300,overflowY:'auto'}}>{meus.map(d=>(
      <div key={d.id} style={{display:'flex',gap:10,justifyContent:'space-between',borderBottom:'1px solid var(--linha)',padding:'6px 0',fontSize:13}}>
        <span><span className="badge" style={{background:'var(--champagne)',marginRight:8}}>{d.categoria}</span>{d.especie||d.tipo||''}</span>
        <span style={{whiteSpace:'nowrap',color:'var(--neutro)'}}>{(d.dataReferencia||d.dataEntrega||'').slice(0,10)} · <a href={d.url} target="_blank" rel="noopener">abrir ↗</a></span>
      </div>))}</div></div>);
}

function FatosRelevantes({f}){

    <div className="cap">Leitura automática dos comunicados no Fundos.NET (últimos publicados). Eventos de risco destacados.</div>
    <div className="fr-list">{fr.map((it,i)=>(
      <div key={i} className={'fr-item'+(it.risco?' risco':'')}>

  </div>);
}

    ['Último provento',f.div_mes!=null?cot(f.div_mes):'—'],['Yield do mês',pct(f.ult_dist_pct)],
    ['Retorno mês',pct(f.ret_mes)],['Retorno ano',pct(f.ret_ano)],['Retorno 12m',pct(f.ret_ltm)],
    ['Máxima 52s',cot(f.maximo_52s)],['% da máxima',pct(f.pct_do_maximo)],
    ['Vol. médio/dia',brl(f.vol_medio_3m)],['Part. IFIX',pct(f.part_ifix,2)],

    'Papel (CRI)':'Indexadores (CDI/IPCA), LTV médio, PDD, rating, duration e high grade × high yield — virão dos relatórios gerenciais.',
    'Híbrido':'Composição tijolo × papel, indexadores e principais ativos — virão dos relatórios gerenciais.',

  const gsearch='https://www.google.com/search?q='+encodeURIComponent(f.ticker+' '+(f.nome||'')+' fundo');

    <div style={{padding:'20px 0 0'}}><button className="btn ghost sm" onClick={onBack}>← Voltar ao universo</button></div>
    <div className="ficha-head">
      <div><span className="kicker">{f.classe} · {f.subclasse}</span><h1>{f.ticker}</h1>
        <div style={{fontFamily:'var(--serif)',fontSize:'20px',color:'var(--tinta)'}}>{f.nome||'—'}</div>
        <div className="meta">Gestor: {f.gestor||'—'} · Administrador: {f.administrador||'—'}{f.cnpj?` · CNPJ ${f.cnpj}`:''}</div></div>
      <span className="badge" style={{background:HEX[f.classe],fontSize:'13px',padding:'4px 12px'}}>{f.classe}</span>
    </div>
    <div className="links">
      {f.site && <a className="btn" href={f.site} target="_blank" rel="noopener">Site do fundo ↗</a>}
      {f.fnet && <a className="btn" href={f.fnet} target="_blank" rel="noopener">Fundos.NET (CVM) ↗</a>}
      {!f.fnet && <button className="btn" disabled>Fundos.NET (CNPJ pendente)</button>}
      {!f.site && <button className="btn ghost" disabled>Site (a cadastrar)</button>}
      <a className="btn ghost" href={gsearch} target="_blank" rel="noopener">Pesquisar ↗</a>
    </div>
    {f.descricao && <div className="note" style={{marginTop:0}}>{f.descricao}</div>}
    <div className="grid-cards">{cards.map(([k,v])=>(<div className="card" key={k}><div className="k">{k}</div><div className="v">{v}</div></div>))}</div>
    <RiscoPanel f={f}/>
    <div className="cols2">
      <div className="panel"><h3>Leitura vs. pares</h3><div className="cap">Como o fundo se posiciona no próprio segmento.</div><VsPares f={f} todos={todos}/></div>

        <div style={{fontSize:'13px',lineHeight:1.7,color:'var(--tinta)'}}>{f.analise||ek}</div>

        {f.pontos_atencao && <div><div className="kicker" style={{marginTop:12,display:'block',color:'#9B3B33'}}>Pontos de atenção</div><div style={{fontSize:'13px',lineHeight:1.7,color:'var(--tinta)',marginTop:4}}>{f.pontos_atencao}</div></div>}

    <DocsFundo f={f} docs={docs}/>

function RangeSlider({label,min,max,step,val,onChange,fmt}){
  const pl=Math.max(0,((val[0]-min)/(max-min))*100), pr=Math.min(100,((val[1]-min)/(max-min))*100);
  return (<div className="rng">
    <div className="rng-lab"><span>{label}</span><b>{fmt(val[0])} – {fmt(val[1])}</b></div>
    <div className="rng-wrap">
      <div className="rng-track"></div>
      <div className="rng-fill" style={{left:pl+'%',width:(pr-pl)+'%'}}></div>
      <input type="range" min={min} max={max} step={step} value={val[0]} onChange={e=>onChange([Math.min(+e.target.value,val[1]),val[1]])}/>
      <input type="range" min={min} max={max} step={step} value={val[1]} onChange={e=>onChange([val[0],Math.max(+e.target.value,val[0])])}/>
    </div>
  </div>);
}

  const [showCmp,setShowCmp]=useState(false);
  const [docs,setDocs]=useState(null);
  const [sel,setSel]=useState(null);
  const [showFlt,setShowFlt]=useState(false);
  const [fPvp,setFPvp]=useState([0,2.5]);
  const [fDy,setFDy]=useState([0,0.3]);
  const [fRet,setFRet]=useState([-0.4,0.6]);
  const [fVm,setFVm]=useState(0);
  const [fScore,setFScore]=useState([0,100]);

  useEffect(()=>{
    if(window.__DATA__){setData(window.__DATA__);}
    else fetch('./data.json').then(r=>r.json()).then(setData)

    fetch('./documentos/indice.json').then(r=>r.ok?r.json():null).then(d=>{if(d)setDocs(d);}).catch(()=>{});
  },[]);

  const fundos=useMemo(()=>data?computeScores(data.fundos):[],[data]);
  const contagem=useMemo(()=>{const c={Todos:fundos.length};ORDEM_CLASSE.forEach(k=>c[k]=fundos.filter(f=>f.classe===k).length);return c;},[fundos]);
  const subclasses=useMemo(()=>classe==='Todos'?[]:[...new Set(fundos.filter(f=>f.classe===classe).map(f=>f.subclasse))].sort(),[fundos,classe]);
  const filtrados=useMemo(()=>{
    let r=fundos;
    if(classe!=='Todos')r=r.filter(f=>f.classe===classe);
    if(sub!=='Todos')r=r.filter(f=>f.subclasse===sub);
    if(busca.trim()){const q=busca.toLowerCase();r=r.filter(f=>(f.ticker+' '+(f.nome||'')+' '+(f.gestor||'')).toLowerCase().includes(q));}
    r=r.filter(f=>{
      if(fPvp[0]>0&&(f.pvpa==null||f.pvpa<fPvp[0]))return false;
      if(fPvp[1]<2.5&&(f.pvpa==null||f.pvpa>fPvp[1]))return false;
      if(fDy[0]>0&&(f.dy_ltm==null||f.dy_ltm<fDy[0]))return false;
      if(fDy[1]<0.3&&(f.dy_ltm==null||f.dy_ltm>fDy[1]))return false;
      if(fRet[0]>-0.4&&(f.ret_ltm==null||f.ret_ltm<fRet[0]))return false;
      if(fRet[1]<0.6&&(f.ret_ltm==null||f.ret_ltm>fRet[1]))return false;
      if(fVm>0&&(f.valor_mercado||0)<fVm)return false;
      if(fScore[0]>0&&(f._sc==null||f._sc<fScore[0]))return false;
      if(fScore[1]<100&&(f._sc==null||f._sc>fScore[1]))return false;
      return true;});
    r=[...r].sort((a,b)=>{const x=a[sortKey],y=b[sortKey];
      if(x==null&&y==null)return 0;if(x==null)return 1;if(y==null)return -1;
      if(typeof x==='string')return x.localeCompare(y)*sortDir;return (x-y)*sortDir;});
    return r;},[fundos,classe,sub,busca,sortKey,sortDir,fPvp,fDy,fRet,fVm,fScore]);

  const setSort=(k)=>{if(sortKey===k)setSortDir(d=>-d);else{setSortKey(k);setSortDir(k==='ticker'||k==='nome'||k==='subclasse'?1:-1);}};
  const toggleCmp=(t)=>setComparar(s=>{const n=new Set(s);n.has(t)?n.delete(t):(n.size<6&&n.add(t));return n;});

  if(erro)return <div><Header/><div className="err"><h2>Ops.</h2><p style={{color:'var(--neutro)'}}>{erro}</p></div></div>;
  if(!data)return <div><Header/><div className="err"><p style={{color:'var(--neutro)'}}>Carregando universo…</p></div></div>;
  if(sel)return <div><Header/><Ficha f={sel} onBack={()=>setSel(null)} todos={fundos} docs={docs}/><Footer meta={data.meta}/></div>;

  const cmpList=fundos.filter(f=>comparar.has(f.ticker));
  const fltAtivos=(fPvp[0]>0||fPvp[1]<2.5?1:0)+(fDy[0]>0||fDy[1]<0.3?1:0)+(fRet[0]>-0.4||fRet[1]<0.6?1:0)+(fVm>0?1:0)+(fScore[0]>0||fScore[1]<100?1:0);
  return (<div><Header/>
    <div className="wrap">
      <section className="hero"><span className="kicker">Universo</span><h1>Fundos listados na B3</h1>
        <div className="lede">Selecione a classe, compare e abra a ficha de cada fundo — FII, Fiagro, FI-Infra e FIP em um só lugar.</div></section>
      <div className="chips">{['Todos',...ORDEM_CLASSE].map(c=>(
        <button key={c} className={'chip'+(classe===c?' on':'')} onClick={()=>{setClasse(c);setSub('Todos');}}>{c}<span className="n">{contagem[c]||0}</span></button>))}</div>
      {subclasses.length>0 && <div className="chips sub">
        <button className={'chip'+(sub==='Todos'?' on':'')} onClick={()=>setSub('Todos')}>Todos os segmentos</button>
        {subclasses.map(s=>(<button key={s} className={'chip'+(sub===s?' on':'')} onClick={()=>setSub(s)}>{s}</button>))}</div>}
      <div className="toolbar"><input className="search" placeholder="Buscar por ticker, nome ou gestor…" value={busca} onChange={e=>setBusca(e.target.value)} />
        <button className="btn ghost sm flt-btn" onClick={()=>setShowFlt(v=>!v)}>{showFlt?'Ocultar filtros':'Filtros'}{fltAtivos>0?` · ${fltAtivos}`:''}</button></div>
      {showFlt && <div className="flt-panel">
        <RangeSlider label="P/VP" min={0} max={2.5} step={0.05} val={fPvp} onChange={setFPvp} fmt={v=>num(v)}/>
        <RangeSlider label="DY LTM" min={0} max={0.3} step={0.005} val={fDy} onChange={setFDy} fmt={v=>pct(v)}/>
        <RangeSlider label="Retorno 12m" min={-0.4} max={0.6} step={0.01} val={fRet} onChange={setFRet} fmt={v=>pct(v)}/>
        <div className="rng"><div className="rng-lab"><span>Valor de mercado mín.</span><b>{fVm>0?brl(fVm):'sem mínimo'}</b></div>
          <input className="rng-single" type="range" min={0} max={5000000000} step={100000000} value={fVm} onChange={e=>setFVm(+e.target.value)}/></div>
        <RangeSlider label="Score de risco" min={0} max={100} step={1} val={fScore} onChange={setFScore} fmt={v=>Math.round(v)}/>
        <div className="flt-actions"><span style={{fontSize:12,color:'var(--neutro)'}}>{filtrados.length} de {fundos.length} fundos</span>
          <button className="btn ghost sm" onClick={()=>{setFPvp([0,2.5]);setFDy([0,0.3]);setFRet([-0.4,0.6]);setFVm(0);setFScore([0,100]);}}>Limpar filtros</button></div>
      </div>}
      <div className="kpis">
        <div className="kpi"><div className="k">Fundos</div><div className="v">{filtrados.length}</div></div>
        <div className="kpi"><div className="k">Patrimônio total</div><div className="v">{brl(filtrados.reduce((s,f)=>s+(f.valor_patrimonial||0),0))}</div></div>
        <div className="kpi"><div className="k">DY LTM mediano</div><div className="v">{pct(mediana(filtrados.map(f=>f.dy_ltm)))}</div></div>
        <div className="kpi"><div className="k">P/VP mediano</div><div className="v">{num(mediana(filtrados.map(f=>f.pvpa)))}</div></div>
      </div>
      <Analises fundos={filtrados} classe={classe} onSel={setSel} comparar={comparar}/>
      <div className="panel"><Tabela fundos={filtrados} onSel={setSel} comparar={comparar} toggleCmp={toggleCmp} sortKey={sortKey} sortDir={sortDir} setSort={setSort}/></div>
    </div>
    <Footer meta={data.meta}/>
    {comparar.size>0 && <div className="cmp-bar">
      <span>{comparar.size} selecionado(s) para comparar {comparar.size>=6?'(máx. 6)':''}</span>
      <span><button className="btn ghost sm" style={{color:'#fff',borderColor:'rgba(255,255,255,.4)',marginRight:8}} onClick={()=>setComparar(new Set())}>Limpar</button>
        <button className="btn" onClick={()=>setShowCmp(true)}>Comparar →</button></span></div>}
    {showCmp && <Comparar fundos={cmpList} onClose={()=>setShowCmp(false)}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
