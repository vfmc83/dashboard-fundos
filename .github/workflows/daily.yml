name: Daily data update

on:
  schedule:
    - cron: '7 12 * * 1-5'   # ~09:07 BRT (seg-sex)
    - cron: '7 21 * * 1-5'   # ~18:07 BRT (seg-sex)
  workflow_dispatch: {}
  repository_dispatch:
    types: [build]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scripts/build_data.py
      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "data: atualização automática $(date -u +%Y-%m-%d)" || echo "sem alterações"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main || true
            git push && break || (echo "push rejeitado, retry $i"; sleep 5)
          done
