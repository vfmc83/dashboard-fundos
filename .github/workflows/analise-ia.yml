name: Analise relatorios (semanal, sem custo)

on:
  workflow_dispatch:
    inputs:
      apenas:
        description: "Tickers separados por virgula (vazio = todos)"
        required: false
        default: ""
  schedule:
    - cron: '0 8 * * 1'   # toda segunda-feira ~05h BRT (cada gestora publica em datas diferentes)

permissions:
  contents: write

concurrency:
  group: analise-relatorios
  cancel-in-progress: false

jobs:
  analise:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar Tesseract (OCR de fallback)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-por
      - run: pip install requests pymupdf pytesseract pillow
      - name: Atualizar indice de documentos (relatorios recentes)
        continue-on-error: true
        run: python scripts/baixar_fnet.py --so-indice --desde 2024 --max-por-fundo 20 --apenas "${{ github.event.inputs.apenas }}"
      - name: Analisar relatorios (incremental - so reprocessa relatorio novo)
        run: python scripts/analise_ia.py --apenas "${{ github.event.inputs.apenas }}"
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json documentos/indice.json
          git commit -m "analise semanal dos relatorios $(date -u +%Y-%m-%d)" || echo "sem alteracoes"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main || true
            git push && break || (echo "push rejeitado, retry $i"; sleep 5)
          done
