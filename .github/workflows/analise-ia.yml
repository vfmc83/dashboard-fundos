name: Analise IA (relatorios)

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 8 3 * *'   # dia 3 de cada mês (~05h BRT)

permissions:
  contents: write

jobs:
  analise:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pymupdf anthropic
      - run: python scripts/analise_ia.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "ia: analise dos relatorios $(date -u +%Y-%m-%d)" || echo "sem alteracoes"
          git push
